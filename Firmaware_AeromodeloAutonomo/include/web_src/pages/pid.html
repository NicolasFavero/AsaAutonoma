<section>
<h2>Ganhos do PID</h2>

<p>Yaw ainda não é usado no controle de voo, mas já fica salvo para quando for implementado.</p>

<div class="grid">

<div class="card">
<h3>Pitch</h3>
<table>
<tr><td>Kp</td><td><input id="pitchKp" type="number" step="0.001"></td></tr>
<tr><td>Ki</td><td><input id="pitchKi" type="number" step="0.001"></td></tr>
<tr><td>Kd</td><td><input id="pitchKd" type="number" step="0.001"></td></tr>
</table>
</div>

<div class="card">
<h3>Roll</h3>
<table>
<tr><td>Kp</td><td><input id="rollKp" type="number" step="0.001"></td></tr>
<tr><td>Ki</td><td><input id="rollKi" type="number" step="0.001"></td></tr>
<tr><td>Kd</td><td><input id="rollKd" type="number" step="0.001"></td></tr>
</table>
</div>

<div class="card">
<h3>Yaw</h3>
<table>
<tr><td>Kp</td><td><input id="yawKp" type="number" step="0.001"></td></tr>
<tr><td>Ki</td><td><input id="yawKi" type="number" step="0.001"></td></tr>
<tr><td>Kd</td><td><input id="yawKd" type="number" step="0.001"></td></tr>
</table>
</div>

</div>

<button id="savePid" class="primary">Salvar Ganhos do PID</button>
</section>
