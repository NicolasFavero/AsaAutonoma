<section>
<h2>Sistema</h2>

<div class="card">
<h3>Configurações Gerais</h3>

<table>
<tr>
<td>Limite da bateria (V)</td>
<td><input id="batteryLimit" type="number" step="0.01"></td>
</tr>

<tr>
<td>Telemetria (ms)</td>
<td><input id="telemetryPeriod" type="number"></td>
</tr>

<tr>
<td>Telemetria bateria baixa (ms)</td>
<td><input id="lowBatteryTelemetryPeriod" type="number"></td>
</tr>

<tr>
<td>Telemetria antes da contagem</td>
<td><input id="preFlightTelemetryEnabled" type="checkbox"></td>
</tr>

<tr>
<td>Telemetria Web</td>
<td><input id="telemetryWeb" type="checkbox"></td>
</tr>

</table>
</div>

<button id="saveSystem" class="primary">
Salvar Configurações
</button>

</section>
