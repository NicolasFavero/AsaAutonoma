; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
	sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
	adafruit/Adafruit ADS1X15@^2.6.2
	adafruit/Adafruit BMP280 Library@^3.0.0
	mikalhart/TinyGPSPlus@^1.1.0
	greiman/SdFat@^2.3.1
	jgromes/RadioLib@^7.7.1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
; PSRAM pro buffer de logs de voo (ver SdLogger::beginBuffer()).
; CONFIGURAÇÃO CORRETA PARA ESP32-S3 SUPER MINI (FH4R2)
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio

monitor_speed = 115200
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D HW_CDC_BUF_SIZE=1024
	-D ARDUINO_USB_MSC_ON_BOOT=0
	-D ARDUINO_USB_DFU_ON_BOOT=0
	-D ICM_20948_USE_DMP
	-D BOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-O2
	-Iinclude

